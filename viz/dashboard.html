<html lang="en">
<head>

<title>LLM Tool-Selection Benchmark — Search Agent Harness</title>
<style>
  :root {
    color-scheme: light;
    --bg: #F8F8F8;
    --panel: #FFFFFF;
    --panel-2: #F0F0F1;
    --border: #E5E5E5;
    --text: #3B3B3B;
    --heading: #1F1F1F;
    --muted: #616161;
    --faint: #868686;
    --accent: #005FB8;
    --grid: #E7E7E8;
    --openai: #10a37f;
    --anthropic: #d97757;
    --ollama: #7c6cf0;
    --good: #1A7F37;
    --good-2: #2EA043;
    --on-good: #FFFFFF;
    --bad: #CF222E;
    --warn: #9A6700;
    --header-2: #FFFFFF;
    --fail-bg: #F7E8E8;
    --fail-border: rgba(207,34,46,0.35);
    --bad-soft: rgba(207,34,46,0.10);
    --code-bg: #F1F1F1;
    --code-fg: #3B3B3B;
    --shadow-soft: 0 6px 18px rgba(31,31,31,0.08);
  }
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #1F1F1F;
    --panel: #181818;
    --panel-2: #262626;
    --border: #2B2B2B;
    --text: #CCCCCC;
    --heading: #FFFFFF;
    --muted: #9D9D9D;
    --faint: #868686;
    --accent: #4DAAFC;
    --grid: #2A2A2A;
    --openai: #10a37f;
    --anthropic: #d97757;
    --ollama: #7c6cf0;
    --good: #3FB950;
    --good-2: #7EE787;
    --on-good: #06210E;
    --bad: #F85149;
    --warn: #D29922;
    --header-2: #161616;
    --fail-bg: #2A2020;
    --fail-border: rgba(248,81,73,0.35);
    --bad-soft: rgba(248,81,73,0.14);
    --code-bg: #0F0F0F;
    --code-fg: #CCCCCC;
    --shadow-soft: 0 10px 28px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    font-size: 14px;
  }
  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--header-2) 0%, var(--bg) 100%);
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  header h1 { margin: 0 0 6px; font-size: 26px; letter-spacing: -0.02em; color: var(--heading); }
  header .sub { color: var(--muted); font-size: 14px; }
  .northstar {
    margin-top: 16px;
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
  }
  .northstar b { color: var(--accent); }
  .legend {
    margin-top: 16px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--muted);
  }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  /* theme toggle (matches sahilashar.com) */
  .theme-toggle {
    appearance: none; border: 1px solid var(--border); background: var(--panel);
    color: var(--heading); border-radius: 999px; width: 44px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease, background-color .2s ease;
    box-shadow: var(--shadow-soft); flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); transform: translateY(-1px); }
  .theme-toggle:active { transform: translateY(0); }
  .theme-toggle:focus-visible { outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 40%, transparent), var(--shadow-soft); }
  .theme-toggle__icon { font-size: 16px; line-height: 1; }
  main {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
    gap: 20px;
    padding: 24px 40px 60px;
    max-width: 1700px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px 22px;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
  }
  .card.wide { grid-column: 1 / -1; }
  .card h2 { margin: 0 0 2px; font-size: 16px; letter-spacing: -0.01em; color: var(--heading); }
  .card .chartnum { color: var(--faint); font-weight: 600; font-size: 12px; margin-right: 6px; }
  .card .insight {
    color: var(--muted);
    font-size: 12.5px;
    margin: 10px 0 16px;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }
  .card .insight b { color: var(--text); }
  svg { display: block; width: 100%; height: auto; overflow: visible; }
  text { font-family: inherit; }
  .axis-label { fill: var(--faint); font-size: 11px; }
  .tick text { fill: var(--muted); font-size: 10px; }
  .tick line { stroke: var(--border); }
  .grid line { stroke: var(--grid); stroke-dasharray: 2 3; }
  .pt-label { fill: var(--text); font-size: 10px; }
  .bar-label { fill: var(--text); font-size: 11px; }
  .bar-val { fill: var(--muted); font-size: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  /* heatmap / strip tables */
  .matrix th { color: var(--muted); font-weight: 500; text-align: center; padding: 5px 6px; font-size: 11px; }
  .matrix td.rowlabel { color: var(--text); text-align: left; padding: 4px 10px 4px 2px; white-space: nowrap; font-size: 12px; }
  .matrix td.cell { text-align: center; padding: 4px; }
  .cellbox { display: inline-flex; align-items: center; justify-content: center; width: 100%; min-width: 54px; height: 30px; border-radius: 5px; font-size: 11px; font-weight: 600; color: var(--heading); }
  .stripcell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .pf { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
  .pass { background: var(--good); color: var(--on-good); }
  .fail { background: var(--fail-bg); color: var(--bad); border: 1px solid var(--fail-border); }
  .calls { font-size: 9.5px; color: var(--faint); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; line-height: 1.3; }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .footer { color: var(--faint); font-size: 11px; padding: 0 40px 40px; max-width: 1700px; margin: 0 auto; }
  .nodata { color: var(--bad); font-size: 12px; padding: 20px; }
  .strip-task { margin: 16px 0 6px; font-size: 12px; font-weight: 600; color: var(--muted); }
  .strip-task:first-of-type { margin-top: 8px; }
  .strip-task code { color: var(--text); }
  .tag { font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 4px; vertical-align: middle; font-weight: 600; }
  .tag.par { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }
  .tag.alt { background: color-mix(in srgb, var(--warn) 20%, transparent); color: var(--warn); }
  .tag.floor { background: color-mix(in srgb, var(--good) 16%, transparent); color: var(--good); }
</style>
<script>
(function () {
  var key = "theme-preference";
  var root = document.documentElement;
  var media = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
  var stored = null;
  try { stored = localStorage.getItem(key); } catch (e) { stored = null; }
  var theme = (stored === "light" || stored === "dark") ? stored : (media && media.matches ? "dark" : "light");
  root.setAttribute("data-theme", theme);
})();
</script>

<script>
"use strict";
const DATA = JSON.parse(document.getElementById('data-blob').textContent);

const COLORS = { openai: 'var(--openai)', anthropic: 'var(--anthropic)', ollama: 'var(--ollama)' };
const provColor = p => COLORS[p] || 'var(--muted)';
const fmtUsd = v => v === 0 ? '$0' : (v < 0.001 ? '$' + v.toFixed(6) : '$' + v.toFixed(v < 0.01 ? 5 : v < 1 ? 4 : 2));
const SVGNS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, text) {
  const e = document.createElementNS(SVGNS, tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if ((k === 'fill' || k === 'stroke') && typeof v === 'string'
        && (v.indexOf('var(') === 0 || v.indexOf('color-mix(') === 0)) {
      e.style[k] = v;
    } else {
      e.setAttribute(k, v);
    }
  }
  if (text != null) e.textContent = text;
  return e;
}
function card(num, title, insightHTML, opts) {
  const c = document.createElement('div');
  c.className = 'card' + (opts && opts.wide ? ' wide' : '');
  const h = document.createElement('h2');
  h.innerHTML = '<span class="chartnum">' + num + '</span>' + title;
  c.appendChild(h);
  const ins = document.createElement('div');
  ins.className = 'insight';
  ins.innerHTML = insightHTML;
  c.appendChild(ins);
  document.getElementById('main').appendChild(c);
  return c;
}

// ---------- header ----------
document.getElementById('subhead').textContent =
  DATA.meta.date + '  ·  ' + DATA.meta.n_configs + ' model configs  ·  ' +
  DATA.meta.n_tasks + '-task hardened dataset  ·  ' + DATA.meta.dataset;
document.getElementById('footer').innerHTML =
  'Distractor tools (never the correct answer): ' +
  DATA.meta.distractor_tools.map(t => '<code>' + t + '</code>').join(', ') +
  '. &nbsp; Chains: ' + Object.entries(DATA.meta.chains).map(([k,v]) => k + ' (' + v + ')').join(', ') +
  '. &nbsp; ' + DATA.meta.note;

const N = DATA.meta.n_tasks;

// ============================================================
// CHART 1 — Quality vs Cost scatter (log x), with frontier
// ============================================================
(function () {
  const c = card('01', 'Quality vs Cost — the money chart',
    'x = total run cost (<b>log scale</b>), y = accuracy (score/' + N + '). Points colored by provider. ' +
    'The dashed line is the <b>cost-efficient frontier</b>: no config is both cheaper and more accurate than a frontier point. ' +
    '<b>gpt-5.4-nano</b> sits at the knee — near-top accuracy for a fraction of a cent; Anthropic configs buy marginal accuracy at 50–100× the cost. gemma is free but lowest quality.',
    {wide:true});

  const W = 1100, H = 420, m = {t: 20, r: 30, b: 55, l: 60};
  const iw = W - m.l - m.r, ih = H - m.t - m.b;
  const svg = el('svg', {viewBox: `0 0 ${W} ${H}`});
  const g = el('g', {transform: `translate(${m.l},${m.t})`});
  svg.appendChild(g);

  const pts = DATA.configs.map(d => ({...d, acc: d.score / N}));
  // log x; treat $0 (gemma) as a pinned leftmost decade
  const costs = pts.map(p => p.total_cost_usd).filter(v => v > 0);
  const minC = Math.min(...costs), maxC = Math.max(...costs);
  const lx0 = Math.log10(minC) - 0.35, lx1 = Math.log10(maxC) + 0.18;
  const xZero = 0; // pixel slot for $0
  const xPlot = x => m.l===0?0:0; // unused
  const sx = c2 => c2 <= 0 ? 12 : 40 + (iw - 40) * (Math.log10(c2) - lx0) / (lx1 - lx0);
  const sy = a => ih - (a) * ih; // 0..1 -> full height (0 at bottom)

  // grid + y ticks (accuracy)
  for (let i = 0; i <= 5; i++) {
    const a = i / 5;
    const y = sy(a);
    g.appendChild(el('line', {class:'', x1:0, y1:y, x2:iw, y2:y, stroke:'var(--grid)', 'stroke-dasharray':'2 3'}));
    g.appendChild(el('text', {x:-10, y:y+3, 'text-anchor':'end', class:'tick'}, (a*100).toFixed(0)+'%'));
  }
  // x ticks (log decades)
  [0.001, 0.01, 0.1, 1].forEach(v => {
    if (Math.log10(v) < lx0 || Math.log10(v) > lx1) return;
    const x = sx(v);
    g.appendChild(el('line', {x1:x, y1:0, x2:x, y2:ih, stroke:'var(--grid)', 'stroke-dasharray':'2 3'}));
    g.appendChild(el('text', {x:x, y:ih+18, 'text-anchor':'middle', class:'tick'}, fmtUsd(v)));
  });
  // $0 slot tick
  g.appendChild(el('text', {x:12, y:ih+18, 'text-anchor':'middle', class:'tick'}, '$0'));
  // axis labels
  g.appendChild(el('text', {x:iw/2, y:ih+44, 'text-anchor':'middle', class:'axis-label'}, 'Total run cost (USD, log scale)'));
  g.appendChild(el('text', {x:-42, y:ih/2, 'text-anchor':'middle', class:'axis-label', transform:`rotate(-90 -42 ${ih/2})`}, 'Accuracy (score / ' + N + ')'));

  // frontier: among paid configs, points not dominated (cheaper AND higher acc)
  const sorted = [...pts].sort((a,b) => a.total_cost_usd - b.total_cost_usd);
  const frontier = [];
  let bestAcc = -1;
  for (const p of sorted) {
    if (p.acc > bestAcc) { frontier.push(p); bestAcc = p.acc; }
  }
  // frontier path
  let dPath = '';
  frontier.forEach((p, i) => {
    const x = sx(p.total_cost_usd), y = sy(p.acc);
    dPath += (i === 0 ? 'M' : 'L') + x + ' ' + y + ' ';
  });
  g.appendChild(el('path', {d:dPath, fill:'none', stroke:'var(--accent)', 'stroke-width':1.6, 'stroke-dasharray':'5 4', opacity:0.7}));

  // points
  pts.forEach(p => {
    const x = sx(p.total_cost_usd), y = sy(p.acc);
    const col = provColor(p.provider);
    const onFront = frontier.includes(p);
    g.appendChild(el('circle', {cx:x, cy:y, r:onFront?7:5.5, fill:col, stroke:onFront?'var(--heading)':'var(--panel)', 'stroke-width':onFront?1.6:1, opacity:0.95}));
    // label
    const lbl = el('text', {x:x+10, y:y+3.5, class:'pt-label', fill:'var(--text)'}, p.label);
    // nudge crowded left cluster
    if (p.total_cost_usd < 0.03 && p.total_cost_usd > 0) lbl.setAttribute('y', y - 8);
    g.appendChild(lbl);
  });

  c.appendChild(svg);
})();

// ============================================================
// CHART 2 — Score ranking (horizontal bars)
// ============================================================
(function () {
  const c = card('02', 'Score ranking — tasks solved (of ' + N + ')',
    'Configs sorted by raw score. <b>Fable 5 (low/med)</b> top the board at 19/' + N + '; <b>gemma4:12b</b> floors at 9. ' +
    'Note OpenAI delivers competitive scores (gpt-5.5 & gpt-5.4-mini at 17–18) — quality is not provider-locked.');

  const rows = [...DATA.configs].sort((a,b) => b.score - a.score || b.accuracy - a.accuracy);
  const W = 540, rowH = 26, m = {t:6, r:48, b:8, l:128};
  const H = m.t + m.b + rows.length * rowH;
  const iw = W - m.l - m.r;
  const svg = el('svg', {viewBox:`0 0 ${W} ${H}`});
  const maxV = N;
  rows.forEach((d, i) => {
    const y = m.t + i*rowH;
    const bw = iw * (d.score / maxV);
    svg.appendChild(el('text', {x:m.l-8, y:y+rowH/2+4, 'text-anchor':'end', class:'bar-label'}, d.label));
    svg.appendChild(el('rect', {x:m.l, y:y+4, width:iw, height:rowH-10, fill:'var(--panel-2)', rx:3}));
    svg.appendChild(el('rect', {x:m.l, y:y+4, width:bw, height:rowH-10, fill:provColor(d.provider), rx:3}));

    'Frontier Anthropic configs cost 50–90× more per correct answer.');

  // exclude gemma (0) from log bars; annotate separately
  const paid = DATA.configs.filter(d => d.cpc_usd > 0).sort((a,b) => a.cpc_usd - b.cpc_usd);

<script>
(function () {
  var key = "theme-preference";
  var root = document.documentElement;
  var button = document.querySelector("[data-theme-toggle]");
  if (!button) return;
  var icon = button.querySelector(".theme-toggle__icon");
  var media = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
  function getTheme() { return root.getAttribute("data-theme") === "dark" ? "dark" : "light"; }
  function syncToggle(theme) {
    var isDark = theme === "dark";
    button.setAttribute("aria-pressed", String(isDark));
    button.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
    if (icon) icon.textContent = isDark ? "☾" : "☀";
  }
  function applyTheme(theme) { root.setAttribute("data-theme", theme); syncToggle(theme); }
  syncToggle(getTheme());
  button.addEventListener("click", function () {
    var next = getTheme() === "dark" ? "light" : "dark";
    applyTheme(next);
    try { localStorage.setItem(key, next); } catch (e) {}
  });
  var stored = null;
  try { stored = localStorage.getItem(key); } catch (e) {}
  if ((stored === "light" || stored === "dark") || !media) return;
  var onChange = function (e) { applyTheme(e.matches ? "dark" : "light"); };
  if (typeof media.addEventListener === "function") media.addEventListener("change", onChange);
  else if (typeof media.addListener === "function") media.addListener(onChange);
})();
</script>
